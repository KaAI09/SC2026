# Driving profile — 2025 test track (yellow-tape shortcut + roundabout).
#
# Single offline -> online contract. offline/control_select.py writes [control].
# Online perception runs the confirmed sliding-window pipeline (front-view);
# [perception] keys are hand-tuned or set live via `ros2 param set
# /perception_node <field>`. perception_node and control_node load this one file
# via the `profile` parameter.
#
# Keys map 1:1 to dracer_core.perception_core.Cfg (perception) and
# dracer_core.control_core.CtrlCfg (control). Unknown keys are ignored.
name: track2025

perception:
  colors: [white, yellow]  # white+yellow fused
  # FRONT-VIEW ONLY (camera:='' ). With a camera.yaml the BEV LUT is itself a calibrated
  # trapezoid crop and these are ignored — measured against this camera the hand-tuned one
  # removed a further 3.7% of the valid BEV and nothing else.
  roi_top_frac: 0.30       # 2025 dashcam heatmap (yellow/roundabout keeps more height)
  trap_top_w: 0.80
  yellow_h_lo: 18          # 2025 dashcam measured band (H 22-32, S>=66, V>=112)
  yellow_h_hi: 36
  yellow_s_min: 65
  yellow_v_min: 100

# 0711 성공 주행(rslt/recorder, 3세션 1,505프레임, 트랙 이탈 0)에서 보드가 실제로 돌린 값.
# 인지가 10.7 -> 30Hz 가 되면서 같은 kp 로도 조향이 훨씬 촘촘히 먹으므로 kp 를 올릴 여유가
# 생겼고, throttle 도 함께 올렸다. 이전 값(kp 0.35 / base 0.20 / min 0.19)은 10Hz 시절 것이다.
control:
  controller: C2           # PD baseline
  kp: 0.45                 # 0711 실차 검증 (was 0.35 @10.7Hz)
  kd: 0.1
  center_target: 0.0
  steer_max: 0.8
  steer_sign: 1.0
  slew_rate: 0.15
  throttle_base: 0.23      # 0711 실차 검증 (was 0.20)
  throttle_min: 0.22       # 0711 실차 검증 (was 0.19)
  conf_gate: 0.4
  # 인지가 state=OUTLIER 를 낼 때의 스로틀. OUTLIER 는 "지금 내가 주는 ema 는 믿지 마라"
  # 는 뜻이고, 코리도어 전환 직후엔 부호까지 반대일 수 있다 (relatch 로 최대 5프레임,
  # 0.17s @30Hz). 그 동안 지나가는 거리를 줄이는 게 목적.
  # throttle_min(0.22) 으로 낮추는 건 base(0.23) 와 차이가 없어 무의미하므로 floor 를
  # 적용하지 않는다. 0.0 = 타력주행(관성으로 굴러가며 마찰로 감속). 실측 OUTLIER 비율은
  # 3.5% (145617) 이므로 스로틀이 끊기는 시간은 전체의 3.5% 수준이다.
  throttle_outlier: 0.0
