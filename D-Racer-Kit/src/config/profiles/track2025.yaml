# Driving profile — 2025 test track (yellow-tape shortcut + roundabout).
#
# Single offline -> online contract: the perception mode/params and controller/
# gains the offline evaluation selected for this track. offline/control_select.py
# writes [control]. Perception online now runs the 7-label logic ported from
# offline/lane7_probe.py into driving_core.lane_core (detect -> sliding-window
# multi-lane -> 7-label -> ego corridor centerline), FRONT-VIEW: the probe's
# uncalibrated ROI-trapezoid warp is dropped. A camera-calibrated BEV is a later
# stage (warp masks before the sliding window). [perception] keys are hand-tuned.
# perception_node and driving_node load this one file via the `profile` parameter
# instead of many separate ROS params.
#
# Keys map 1:1 to driving_core.lane_core.Cfg (perception) and
# driving_core.control_core.CtrlCfg (control). Unspecified keys use presets.
name: track2025

perception:
  mode: G5                 # white+yellow fused (lane7 front-view; calibrated BEV deferred)
  colors: [white, yellow]
  roi_top_frac: 0.30       # 2025 dashcam heatmap (yellow/roundabout keeps more height)
  trap_top_w: 0.80
  yellow_h_lo: 18          # 2025 dashcam measured band (H 22-32, S>=66, V>=112)
  yellow_h_hi: 36
  yellow_s_min: 65
  yellow_v_min: 100

control:
  controller: C2           # PD baseline
  kp: 0.5
  kd: 0.1
  center_target: 0.0
  steer_max: 0.8
  steer_sign: 1.0
  slew_rate: 0.15
  throttle_base: 0.20
  throttle_min: 0.18
  conf_gate: 0.4
