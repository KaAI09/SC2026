# Driving profile — 2025 test track (yellow-tape shortcut + roundabout).
#
# Single offline -> online contract. Hand-edited (there is no automated writer any more).
# Online perception runs the confirmed sliding-window pipeline on a calibrated metric
# BEV (camera.yaml is REQUIRED — the front-view path was removed);
# [perception] keys are hand-tuned or set live via `ros2 param set
# /perception_node <field>`. perception_node and control_node load this one file
# via the `profile` parameter.
#
# Keys map 1:1 to dracer_core.perception_core.Cfg (perception) and
# dracer_core.control_core.CtrlCfg (control). Unknown keys are ignored.
name: track2025

perception:
  colors: [white, yellow]  # white+yellow fused
  yellow_h_lo: 18          # 2025 dashcam measured band (H 22-32, S>=66, V>=112)
  yellow_h_hi: 36
  yellow_s_min: 65
  yellow_v_min: 100

# 최종 성공 주행(offline/rslt/0712, 3세션 1,294프레임 @30.0Hz)에서 보드가 실제로 돌린 값.
# 그 주행의 인지 실측: valid 100% · state 전부 OK (OUTLIER/LOST/HOLD 0회) · 분기 1.6%.
control:
  controller: PD           # PD | PID. 모르는 이름은 예외를 던진다 (조용한 폴백 없음).
  # ⚠ 서보 실측(A1) 이후 조향 스케일이 바뀌었다 — kp 는 0.45 에서 다시 잡은 값이다.
  #
  # 실측(실차 직진): center 1650us = 0도, 1350~1950us = ±25도  (300us = 25도)
  #   옛 설정(center 1500 / span 500 / actuator 가 clamp(u + 0.3))의 조향각:
  #       각도(u) = (1500 + (u+0.3)×500 − 1650) × 25/300 = 41.67u 도   (포화 전)
  #   새 설정(트림이 서보 중립에 있다):
  #       각도(u) = 25u 도
  #   같은 오차에 같은 조향각을 내려면 게인이 41.67/25 = 1.667배여야 한다.
  #       kp 0.45 × 1.667 = 0.75
  #
  # 0.75 는 계산상 등가일 뿐 **실차 미검증**이다. 첫 주행은 저속·감시 하에서. 진동하면
  # 낮추고 굼뜨면 올려라 — 조향은 이제 ±1.0 전 구간이 선형이다(포화 없음).
  kp: 0.75
  kd: 0.1
  center_target: 0.0
  # 트림이 서보 중립(SERVO_CENTER_US)으로 갔으므로 u 는 ±1.0 전체를 쓴다.
  #
  # 옛 0.7 은 "u 와 트림이 같은 [-1,1] 예산을 나눠 쓰니 양쪽 다 0.7까지만" 이라는 임시
  # 방편이었고, 실측이 그 대가를 보여줬다: u=±0.6 에서 이미 바퀴가 ±25도로 끝까지 돌아
  # **명령 범위의 14%(0.6~0.7)가 조향각을 전혀 바꾸지 못했다.** 제어기는 더 달라는데 바퀴는
  # 멈춰 있고, 제어기는 그것을 알 길이 없다. 이제 ±1.0 전 구간이 선형이다.
  steer_max: 1.0
  steer_sign: 1.0
  # 초당 조향 변화 상한. 예전엔 slew_rate: 0.15 "프레임당" 이었고, 그래서 차의 최대 회전
  # 속도가 그날의 인지 FPS 였다 (10.7Hz -> 1.6/s, 30Hz -> 4.5/s). 성공 주행이 30Hz 에서
  # 실제로 낸 값이 4.5/s 이고, 그걸 물리량으로 못박았다. 이제 인지가 20Hz 로 떨어져도
  # 차는 같은 속도로 조향한다 (예전 코드였다면 3.0/s 로 조용히 둔해졌다).
  #
  # ⚠ 그런데 이건 u/초 이지 도/초 가 아니다 — kp 와 **정확히 같은 이유로** 서보 실측(A1)
  # 이후 다시 잡아야 했다. 0712 가 실제로 낸 회전 속도는 4.5 × 41.67 = 187.5 도/초 이고,
  # 새 스케일(25도/u)에서 그것을 유지하려면 187.5 / 25 = 7.5 u/초 다. 4.5 를 그대로 뒀다면
  # 차의 최대 회전 속도가 아무 말 없이 40% 둔해졌을 것이다.
  slew_rate_per_sec: 7.5
  throttle_base: 0.23
  throttle_min: 0.22
  conf_gate: 0.4
  # 인지가 state=OUTLIER 를 낼 때의 스로틀. OUTLIER 는 "지금 내가 주는 ema 는 믿지 마라"
  # 는 뜻이고, 코리도어 전환 직후엔 부호까지 반대일 수 있다 (relatch 로 최대 5프레임,
  # 0.17s @30Hz). 그 동안 지나가는 거리를 줄이는 게 목적.
  # throttle_min(0.22) 으로 낮추는 건 base(0.23) 와 차이가 없어 무의미하므로 floor 를
  # 적용하지 않는다. 0.0 = 타력주행(관성으로 굴러가며 마찰로 감속).
  # 0712 성공 주행에서는 OUTLIER 가 한 번도 발생하지 않아 이 경로가 타지 않았다.
  throttle_outlier: 0.0
