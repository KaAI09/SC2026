# D3-G 로컬 하드웨어 설정. **보드마다 다르다** — `git reset --hard` 가 덮어쓰므로
# SERVO_* 와 ACCEL_RATIO 는 동기화 전에 적어둬라.

# --- 카메라 -----------------------------------------------------------------
USB_CAM: true                 # USB / MIPI 중 정확히 하나만 true
MIPI_CAM: false
USB_CAM_DEVICE: /dev/video1   # v4l2 장치 경로
IMAGE_WIDTH: 320              # 카메라가 발행하는 해상도. perception 이 camera.yaml 을 여기에
IMAGE_HEIGHT: 240             #   맞춰 rescale 한다 — 캘리브 해상도와 달라도 된다

# --- 조향 서보 (실측: scripts/servo_sweep.py + 실차 직진 확인) ----------------
# center 1650us = 0도,  1350us = 우 25도,  1950us = 좌 25도   (300us = 25도)
SERVO_CENTER_US: 1650   # 바퀴가 직진하는 펄스. 조이스틱 Y/B 가 ±10us 조정해 여기 써넣는다
SERVO_SPAN_US: 300      # u=±1.0 이 내는 펄스 폭 = ±25도. **조향 반경**이지 서보 한계가 아니다
SERVO_MIN_US: 1250      # 서보 하드 clip 하한 (조향 반경보다 넓다 = 트림 조정 여유)
SERVO_MAX_US: 2050      # 서보 하드 clip 상한

# --- 구동 -------------------------------------------------------------------
ACCEL_RATIO: 0.215      # 조이스틱 스로틀 배율. L1/R1 이 조정해 여기 써넣는다.
                        # ⚠ 자율주행과 무관하다 (자율 스로틀은 프로파일의 throttle_base)

# --- 모니터 (웹 :5000) -------------------------------------------------------
WEB_HOST: 0.0.0.0
WEB_PORT: 5000
STORAGE_PATH: /               # 디스크 사용량을 표시할 마운트 지점
IMAGE_DISPLAY_WIDTH: 320      # 카메라 미연결 시 placeholder SVG 크기. **전송량과 무관하다** —
IMAGE_DISPLAY_HEIGHT: 240     #   대역폭 노브는 camera_node 의 jpeg_quality 다

# --- 토픽 -------------------------------------------------------------------
IMAGE_TOPIC: /camera/image/compressed
BATTERY_TOPIC: /battery_status
